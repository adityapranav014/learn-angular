<div class="container pb-4">

  <!-- Header -->
  <div class="row align-items-center mb-4">
    <div class="col-auto">
      <div class="d-flex align-items-center gap-2 brand-text bg-white px-3 py-2 border text-brand rounded-2">
        <i class="bi bi-calculator-fill fs-5"></i>
        <span class="vr opacity-25 mx-1"></span>
        <span class="fw-bold" style="font-size: 0.95rem;">Calculator</span>
      </div>
    </div>
  </div>

  <div class="row g-4">

    <!-- Task Column -->
    <div class="col-lg-4 col-md-6">
      <div class="card h-100 shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-3 pb-2">
          <h5 class="card-title text-secondary mb-0 fw-bold">
            <i class="bi bi-clipboard-data-fill me-2 brand-color"></i>Task 1
          </h5>
        </div>
        <div class="card-body bg-white rounded-bottom">
          <div class="text-start pb-3">
            <h5 class="fw-bold text-dark">Calculator</h5>
          </div>
          <ul class="mb-0 text-muted small">
            <li class="mb-2"><strong>Calculator Math Processor</strong>: Bind click events to append digits and
              operators to a formula string.</li>
            <li><strong>Evaluation Processor</strong>: Evaluate expressions dynamically using custom TS processing
              methods.</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Live Solution Column -->
    <div class="col-lg-4 col-md-6">
      <div class="card h-100 shadow-sm card-live-solution">
        <div class="card-header card-header-live-solution pt-3 pb-2">
          <h5 class="card-title mb-0 fw-bold">
            <i class="bi bi-play-circle me-2"></i>Live Solution
          </h5>
        </div>
        <div
          class="card-body d-flex flex-column align-items-center justify-content-center bg-white rounded-bottom py-4">

          <div class="calculadora">
            <input type="text" [value]="resultado" class="form-control resultado" placeholder="0" disabled="disabled">

            <div class="row">
              <button (click)="calculator('action', 'c')" type="button"
                class="btn btn-dark btn-lg clear font-weight-light">C</button>
              <button (click)="calculator('action', '/')" type="button"
                class="btn btn-dark btn-lg font-weight-light">/</button>
              <button (click)="calculator('action', '*')" type="button"
                class="btn btn-dark btn-lg font-weight-light">x</button>
            </div>

            <div class="row">
              <button (click)="calculator('valor', 7)" type="button"
                class="btn btn-dark btn-lg font-weight-light">7</button>
              <button (click)="calculator('valor', 8)" type="button"
                class="btn btn-dark btn-lg font-weight-light">8</button>
              <button (click)="calculator('valor', 9)" type="button"
                class="btn btn-dark btn-lg font-weight-light">9</button>
              <button (click)="calculator('action', '-')" type="button"
                class="btn btn-dark btn-lg font-weight-light">-</button>
            </div>

            <div class="row">
              <button (click)="calculator('valor', 4)" type="button"
                class="btn btn-dark btn-lg font-weight-light">4</button>
              <button (click)="calculator('valor', 5)" type="button"
                class="btn btn-dark btn-lg font-weight-light">5</button>
              <button (click)="calculator('valor', 6)" type="button"
                class="btn btn-dark btn-lg font-weight-light">6</button>
              <button (click)="calculator('action', '+')" type="button"
                class="btn btn-dark btn-lg font-weight-light">+</button>
            </div>

            <div class="row">
              <button (click)="calculator('valor', 1)" type="button"
                class="btn btn-dark btn-lg font-weight-light">1</button>
              <button (click)="calculator('valor', 2)" type="button"
                class="btn btn-dark btn-lg font-weight-light">2</button>
              <button (click)="calculator('valor', 3)" type="button"
                class="btn btn-dark btn-lg font-weight-light">3</button>
              <button (click)="calculator('action', '=')" type="button" class="btn btn-dark btn-lg enter">=</button>
            </div>

            <div class="row" style="margin-top: -60px">
              <button (click)="calculator('valor', 0)" type="button"
                class="btn btn-dark zero btn-lg font-weight-light">0</button>
              <button (click)="calculator('action', '.')" type="button"
                class="btn btn-dark btn-lg font-weight-light">.</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Code Hint Column -->
    <div class="col-lg-4 col-md-12">
      <app-code-viewer [codeFiles]="codeFiles" class="h-100"></app-code-viewer>
    </div>

  </div>
</div>
