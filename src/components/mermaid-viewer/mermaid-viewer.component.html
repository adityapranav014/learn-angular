<div class="col-12 col-xl-6">
  <div class="card h-100 border-0 shadow-sm">
    <div class="card-header bg-white border-bottom-0 pt-3 pb-2">
      <h5 class="card-title text-secondary mb-0 fw-bold">
        <i class="bi bi-clipboard-data-fill me-2 brand-color"></i>Topic {{ i + 1 }}
      </h5>
    </div>
    <div class="card-body bg-white rounded-bottom">
      <div class="d-flex align-items-center gap-2 mb-3">
        <h5 class="fw-bold text-dark mb-0" [innerHTML]="section.heading"></h5>
      </div>

      <div class="study-section-body text-dark mb-4" [innerHTML]="section.content"></div>

      @if (section.mermaidDefinition) {
      <div class="mt-4 pt-3 border-top border-light">
        <div class="d-flex align-items-center gap-2 mb-2 text-magenta small fw-bold tracking-wide text-uppercase">
          <i class="bi bi-diagram-3-fill"></i> Architectural Concept Map
        </div>
        <app-mermaid-viewer [definition]="section.mermaidDefinition"></app-mermaid-viewer>
      </div>
      }
    </div>
  </div>
</div>
