<section class="hero-section" [class.hero-entrance-done]="entranceComplete()" aria-label="Welcome to Angular Aditya">

  <!-- ── Background Video (Mouse-Scrubbed) ────────────────────────── -->
  <!-- Mobile: Normal Autoplay & Loop (Visible on small/medium, hidden on large screens) -->
  <video class="hero-video d-block d-lg-none" ikSrc="/angular-aditya/hero.mp4" autoplay muted
    loop playsinline preload="auto" aria-hidden="true">
  </video>

  <!-- Desktop: Mouse-Scrubbed Video (Hidden on small/medium, visible on large screens) -->
  <video #heroVideo class="hero-video d-none d-lg-block" ikSrc="/angular-aditya/hero.mp4" muted playsinline
    preload="auto" aria-hidden="true">
  </video>

  <!-- ── Dot Grid Overlay ─────────────────────────────────────────── -->
  <div class="hero-dot-grid" aria-hidden="true"></div>

  <!-- ── Bottom Gradient Overlay for Readability ──────────────────── -->
  <div class="hero-bottom-overlay" aria-hidden="true"></div>

  <!-- ── Large Watermark Text ──────────────────────────────────────── -->
  <div class="hero-watermark" aria-hidden="true">ANGULAR</div>

  <!-- ── Hero Content Layer ───────────────────────────────────────── -->
  <div class="hero-content">

    <!-- ── Top Row ─────────────────────────────────────────────────── -->
    <div class="hero-top-row">
      <h1 class="hero-heading">
        <app-scramble-in [text]="'Learn'" [delay]="200" [triggered]="triggered()"></app-scramble-in><br><app-scramble-in [text]="'Angular'" [delay]="500" [triggered]="triggered()"></app-scramble-in>
      </h1>
    </div>

    <!-- Spacer pushes content to the bottom -->
    <div class="hero-spacer"></div>

    <!-- ── Bottom Row ──────────────────────────────────────────────── -->
    <div class="hero-bottom-row">

      <!-- Left Column -->
      <div class="hero-col-left">
        <p class="hero-desc">
          Behind every flawless interface is a story of meticulous architecture.
          We strip away the noise and invite you into the very core of Angular.
          Here, you won't just write code. You will orchestrate reactivity,
          command state, and sculpt the modern web.
        </p>
      </div>

      <!-- Right Column -->
      <div class="hero-col-right">
        <h1 class="hero-heading hero-heading--right">
          <app-scramble-in [text]="'The'" [delay]="700" [triggered]="triggered()"></app-scramble-in><br><app-scramble-in [text]="'Framework'" [delay]="1000" [triggered]="triggered()"></app-scramble-in>
        </h1>
      </div>

    </div>

    <!-- ── Interactive Scroll Indicator ────────────────────────────── -->
    <div class="hero-scroll-indicator" (click)="scrollDown()">
      <div class="mouse-icon">
        <div class="wheel-icon"></div>
      </div>
      <span class="scroll-text">Begin The Journey</span>
    </div>

  </div>
</section>
