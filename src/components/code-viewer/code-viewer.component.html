<div class="card h-100 shadow-sm border-0 bg-dark text-light" [class.code-hint-fullscreen]="isFullscreen">

    @if (codeFiles.length > 0 && activeFile) {

    <div class="card-header bg-dark border-bottom border-secondary pt-3 pb-0 px-0">
        <div class="d-flex align-items-center justify-content-between px-3 mb-2">
            <h5 class="card-title text-light mb-0 fw-bold">
                <i class="bi bi-code-slash me-2 text-warning"></i>Code Example
            </h5>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-sm btn-outline-secondary border-0 text-light py-0 px-2"
                    [ngbTooltip]="isCopied ? null : 'Copy to clipboard'" placement="left" (click)="copyCode()">
                    <i class="bi" [class.bi-clipboard]="!isCopied" [class.bi-check2-all]="isCopied"
                        [class.text-success]="isCopied"></i>
                    <span class="ms-1 small" *ngIf="isCopied">Copied!</span>
                </button>
                <button class="btn btn-sm btn-dark border-0 p-1 lh-1"
                    [ngbTooltip]="isFullscreen ? 'Exit fullscreen' : 'Fullscreen'" placement="left"
                    (click)="toggleFullscreen()">
                    <i class="bi" [class.bi-fullscreen]="!isFullscreen" [class.bi-fullscreen-exit]="isFullscreen"></i>
                </button>
            </div>
        </div>

        @if (codeFiles.length > 1) {
        <div class="d-flex overflow-auto px-2 code-tabs-scroll">
            @for (file of codeFiles; track file.fileName; let fIdx = $index) {
            <button class="btn btn-sm rounded-0 border-0 text-light code-tab" [class.active]="safeIdx === fIdx"
                (click)="setActiveFile(fIdx)">
                {{ file.fileName }}
            </button>
            }
        </div>
        } @else {
        <div class="px-3 pb-2 text-secondary small border-top border-secondary pt-2 mt-1">
            {{ activeFile.fileName }}
        </div>
        }
    </div>

    <div class="card-body study-code-hint-body p-0">
        <pre class="m-0 h-100"><code class="h-100 p-3 custom-scrollbar"
        [highlight]="activeFile.code"
        [language]="activeFile.language"></code></pre>
    </div>

    } @else {

    <div class="card-header bg-dark border-bottom border-secondary pt-3 pb-2">
        <div class="d-flex align-items-center justify-content-between">
            <h5 class="card-title text-light mb-0 fw-bold">
                <i class="bi bi-code-slash me-2 text-warning"></i>Code Hint
            </h5>
        </div>
    </div>
    <div class="card-body study-code-hint-body">
        <div class="text-secondary small p-4 text-center mt-5">
            <i class="bi bi-code-slash fs-1 opacity-25 d-block mb-3"></i>
            <p class="mb-2 fw-semibold fs-6">No code needed here.</p>
            <p class="mb-0">Focus on the theory card to grasp this concept.</p>
        </div>
    </div>

    }

</div>
